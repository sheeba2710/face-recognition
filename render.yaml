services:
  - type: web
    name: face-recognition-system
    env: docker
    plan: starter
    envVars:
      - key: DATABASE_PATH
        value: /app/data/database.db
      - key: TZ
        value: Asia/Kolkata
    disk:
      name: face-recognition-data
      mountPath: /app/data
      sizeGB: 1
